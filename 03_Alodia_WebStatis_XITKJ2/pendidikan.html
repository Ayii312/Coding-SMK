<!DOCTYPE html>

<head>

    <title>Pendidikan Alodia</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;

            margin-bottom: 0.5rem;
            text-transform: uppercase;

        .box p {

        }

            .box {
